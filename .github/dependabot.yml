version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      prisma:
        patterns:
          - prisma
          - '@prisma/*'
      electron:
        patterns:
          - electron
          - electron-builder
    # Electron 42+ breaks better-sqlite3 native rebuild (WiseLibs/better-sqlite3#1474).
    ignore:
      - dependency-name: electron
        update-types: ["version-update:semver-major"]
